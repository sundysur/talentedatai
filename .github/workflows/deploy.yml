name: Build & Deploy TalentedAtAI

on:
  push:
    branches:
      - main
    paths:
      - 'content/published/**'
      - 'index.html'
      - 'dashboard/**'
      - 'assets/**'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual rebuild'

jobs:
  build-and-deploy:
    name: Build Site & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g marked gray-matter
          echo "Dependencies installed"

      - name: Build article pages from published markdown
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { marked } = require('marked');
          const matter = require('gray-matter');

          const publishedDir = './content/published';
          const outputDir = './content/published';

          if (!fs.existsSync(publishedDir)) {
            console.log('No published articles yet.');
            process.exit(0);
          }

          const mdFiles = fs.readdirSync(publishedDir).filter(f => f.endsWith('.md'));
          console.log(`Building ${mdFiles.length} article(s)...`);

          const articles = [];

          mdFiles.forEach(file => {
            const raw = fs.readFileSync(path.join(publishedDir, file), 'utf8');
            const { data: fm, content } = matter(raw);
            const html = marked(content);
            const slug = file.replace('.md', '');

            articles.push({ slug, ...fm });

            const articlePage = `<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>${fm.title} | TalentedAtAI</title>
            <meta name="description" content="${fm.description || ''}"/>
            <meta property="og:title" content="${fm.title}"/>
            <meta property="og:description" content="${fm.description || ''}"/>
            <meta property="og:type" content="article"/>
            <meta name="author" content="${fm.author || ''}"/>
            <link rel="canonical" href="https://talentedatai.com/content/published/${slug}.html"/>
            <link rel="preconnect" href="https://fonts.googleapis.com"/>
            <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
            <style>
              *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
              :root{--blue:#0066ff;--dark:#0d0d1a;--gray-500:#6b6b8a;--gray-100:#f4f4f8;--white:#fff}
              body{font-family:'DM Sans',sans-serif;color:var(--dark);background:var(--white);line-height:1.7;-webkit-font-smoothing:antialiased}
              a{color:var(--blue)}
              .nav{position:sticky;top:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,102,255,0.08);padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;z-index:100}
              .nav__logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--dark);text-decoration:none}
              .nav__logo span{color:var(--blue)}
              .nav__back{font-size:14px;color:var(--gray-500);text-decoration:none;display:flex;align-items:center;gap:6px}
              .nav__back:hover{color:var(--blue)}
              .hero{max-width:760px;margin:0 auto;padding:64px 24px 48px}
              .article-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
              .category-pill{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:100px;background:var(--blue-light,#e6f0ff);color:var(--blue)}
              .article-meta span{font-size:13px;color:var(--gray-500)}
              h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:20px}
              .article-body{max-width:760px;margin:0 auto;padding:0 24px 80px}
              .article-body h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin:40px 0 16px}
              .article-body h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin:32px 0 12px}
              .article-body p{margin-bottom:20px;font-size:17px;color:#2d2d4a}
              .article-body ul,.article-body ol{margin:0 0 20px 24px}
              .article-body li{font-size:17px;color:#2d2d4a;margin-bottom:8px}
              .article-body strong{color:var(--dark)}
              .article-body hr{border:none;border-top:1px solid #eee;margin:40px 0}
              .article-body blockquote{border-left:4px solid var(--blue);padding:16px 20px;background:#f4f8ff;border-radius:0 12px 12px 0;margin:24px 0}
              .article-body code{background:#f4f4f8;padding:2px 6px;border-radius:6px;font-size:14px}
              .footer-strip{background:#0d0d1a;color:rgba(255,255,255,.6);text-align:center;padding:32px 24px;font-size:14px}
              .footer-strip a{color:var(--blue)}
            </style>
          </head>
          <body>
          <nav class="nav">
            <a href="../../index.html" class="nav__logo">Talented<span>At</span>AI</a>
            <a href="../../index.html" class="nav__back">← Back to all articles</a>
          </nav>
          <div class="hero">
            <div class="article-meta">
              <span class="category-pill">${fm.category || 'General'}</span>
              <span>${fm.author || 'TalentedAtAI Team'}</span>
              <span>·</span>
              <span>${fm.date || ''}</span>
              <span>·</span>
              <span>${Math.ceil(content.split(' ').length / 200)} min read</span>
            </div>
            <h1>${fm.title}</h1>
            <p style="font-size:18px;color:#6b6b8a;line-height:1.6">${fm.description || ''}</p>
          </div>
          <div class="article-body">${html}</div>
          <div class="footer-strip">
            &copy; 2026 <a href="https://talentedatai.com">TalentedAtAI</a>. All rights reserved.
          </div>
          </body>
          </html>`;

            fs.writeFileSync(path.join(outputDir, `${slug}.html`), articlePage);
            console.log(`  ✓ Built: ${slug}.html`);
          });

          // Update article index JSON for dynamic homepage
          fs.writeFileSync('./content/articles.json', JSON.stringify(articles, null, 2));
          console.log(`\nBuild complete. ${mdFiles.length} article(s) built.`);
          EOF

      - name: Validate build output
        run: |
          echo "=== Build Summary ==="
          echo "Published articles:"
          ls content/published/*.html 2>/dev/null | wc -l
          echo "article(s) built"
          echo ""
          echo "=== File sizes ==="
          du -sh content/published/*.html 2>/dev/null || echo "(none yet)"
          du -sh index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy summary
        run: |
          echo ""
          echo "🚀 Deployment complete!"
          echo "🌐 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Deployed at: $(date -u)"
          echo ""
          echo "Articles deployed:"
          ls content/published/*.md 2>/dev/null | while read f; do
            basename "$f" .md
          done || echo "(no articles yet)"

  # Optional: Send notification when new article is published
  notify:
    name: Notify on Publish
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Log successful deployment
        run: |
          echo "✅ TalentedAtAI successfully deployed to GitHub Pages"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
