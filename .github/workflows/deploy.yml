name: Build and Deploy TalentedAtAI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual rebuild'

jobs:
  build-and-deploy:
    name: Build Site and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install marked gray-matter

      - name: Build article pages
        run: node scripts/build.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify on Publish
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Log successful deployment
        run: |
          echo "TalentedAtAI successfully deployed"
          echo "Triggered by ${{ github.actor }}"
