<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentedAtAI — Content Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0066ff;
      --blue-light: #e6f0ff;
      --green: #00cc66;
      --green-light: #e6fff0;
      --red: #ff3355;
      --red-light: #ffe6ea;
      --orange: #ff9900;
      --orange-light: #fff3e0;
      --dark: #0d0d1a;
      --gray-700: #3d3d5c;
      --gray-500: #6b6b8a;
      --gray-300: #b8b8d0;
      --gray-100: #f4f4f8;
      --white: #ffffff;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    body {
      font-family: var(--font-body);
      background: var(--gray-100);
      color: var(--dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Sidebar */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: var(--dark);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }
    .sidebar__logo {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.02em;
    }
    .sidebar__logo span { color: var(--blue); }
    .sidebar__subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .sidebar__nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar__nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
    }
    .sidebar__nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .sidebar__nav-item.active { background: var(--blue); color: var(--white); }
    .sidebar__nav-item .badge {
      margin-left: auto;
      background: var(--orange);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 100px;
    }
    .sidebar__footer {
      margin-top: auto;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }

    /* Main */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 36px 40px;
      max-width: calc(100% - 240px);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }
    .topbar__title {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .topbar__meta { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
    .topbar__actions { display: flex; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 100px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn--primary { background: var(--blue); color: var(--white); }
    .btn--primary:hover { background: #3385ff; transform: translateY(-1px); }
    .btn--ghost { background: var(--white); color: var(--gray-700); border: 1px solid #e0e0ee; }
    .btn--ghost:hover { border-color: var(--blue); color: var(--blue); }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-tile {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-tile__icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .stat-tile__number { font-family: var(--font-head); font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-tile__label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--white);
      border-radius: 100px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .tab {
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gray-500);
      border: none;
      background: none;
    }
    .tab.active { background: var(--blue); color: var(--white); }
    .tab:not(.active):hover { color: var(--dark); }

    /* Article Queue */
    .articles-list { display: flex; flex-direction: column; gap: 14px; }
    .article-row {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border-left: 4px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .article-row:hover { border-left-color: var(--blue); transform: translateX(3px); }
    .article-row.approved { border-left-color: var(--green); }
    .article-row.rejected { border-left-color: var(--red); opacity: 0.6; }

    .article-row__emoji {
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--gray-100);
    }
    .article-row__body { flex: 1; min-width: 0; }
    .article-row__title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-row__meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .article-row__meta span { font-size: 12px; color: var(--gray-500); }
    .article-row__meta .dot { color: var(--gray-300); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .status-pill--pending { background: var(--orange-light); color: var(--orange); }
    .status-pill--approved { background: var(--green-light); color: var(--green); }
    .status-pill--rejected { background: var(--red-light); color: var(--red); }
    .status-pill::before { content: '●'; font-size: 8px; }

    .article-row__actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
    .action-btn {
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .action-btn--approve { background: var(--green-light); color: var(--green); }
    .action-btn--approve:hover { background: var(--green); color: var(--white); }
    .action-btn--reject { background: var(--red-light); color: var(--red); }
    .action-btn--reject:hover { background: var(--red); color: var(--white); }
    .action-btn--view { background: var(--blue-light); color: var(--blue); }
    .action-btn--view:hover { background: var(--blue); color: var(--white); }
    .action-btn--undo { background: var(--gray-100); color: var(--gray-700); }
    .action-btn--undo:hover { background: var(--gray-300); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,26,0.6);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 36px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    }
    .modal__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }
    .modal__title { font-family: var(--font-head); font-size: 20px; font-weight: 800; line-height: 1.2; }
    .modal__close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .modal__close:hover { background: var(--gray-300); }
    .modal__meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .modal__meta-tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 100px;
      font-weight: 600;
    }
    .modal__body {
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.7;
      border-top: 1px solid var(--gray-100);
      padding-top: 20px;
      margin-bottom: 24px;
      white-space: pre-line;
    }
    .modal__actions { display: flex; gap: 10px; }
    .modal__actions .btn { flex: 1; justify-content: center; padding: 12px; }
    .btn--approve { background: var(--green); color: var(--white); }
    .btn--approve:hover { background: #00aa55; }
    .btn--reject { background: var(--red); color: var(--white); }
    .btn--reject:hover { background: #cc0033; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--dark);
      color: var(--white);
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .empty-state__icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state__title { font-family: var(--font-head); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty-state__subtitle { font-size: 14px; color: var(--gray-500); }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; max-width: 100%; padding: 24px 20px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <div class="sidebar__logo">Talented<span>At</span>AI</div>
      <div class="sidebar__subtitle">Content Dashboard</div>
    </div>
    <nav class="sidebar__nav">
      <button class="sidebar__nav-item active" onclick="showTab('pending')">
        📥 Pending Review
        <span class="badge" id="pending-badge">3</span>
      </button>
      <button class="sidebar__nav-item" onclick="showTab('published')">
        ✅ Published
      </button>
      <button class="sidebar__nav-item" onclick="showTab('rejected')">
        ❌ Rejected
      </button>
      <button class="sidebar__nav-item" onclick="window.open('../index.html','_blank')">
        🌐 View Site
      </button>
    </nav>
    <div class="sidebar__footer">
      TalentedAtAI v1.0<br />
      talentedatai.com
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar__title" id="page-title">Pending Review</div>
        <div class="topbar__meta" id="page-meta">Articles awaiting your approval</div>
      </div>
      <div class="topbar__actions">
        <button class="btn btn--ghost" onclick="approveAll()">✓ Approve All</button>
        <button class="btn btn--primary" onclick="refreshDashboard()">↻ Refresh</button>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-tile">
        <div class="stat-tile__icon" style="background:#fff3e0">📥</div>
        <div>
          <div class="stat-tile__number" id="stat-pending" style="color:var(--orange)">3</div>
          <div class="stat-tile__label">Pending</div>
        </div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile__icon" style="background:#e6fff0">✅</div>
        <div>
          <div class="stat-tile__number" id="stat-published" style="color:var(--green)">0</div>
          <div class="stat-tile__label">Published</div>
        </div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile__icon" style="background:#ffe6ea">❌</div>
        <div>
          <div class="stat-tile__number" id="stat-rejected" style="color:var(--red)">0</div>
          <div class="stat-tile__label">Rejected</div>
        </div>
      </div>
      <div class="stat-tile">
        <div class="stat-tile__icon" style="background:var(--blue-light)">📊</div>
        <div>
          <div class="stat-tile__number" id="stat-total" style="color:var(--blue)">3</div>
          <div class="stat-tile__label">Total Articles</div>
        </div>
      </div>
    </div>

    <!-- Tab Content -->
    <div id="articles-container">
      <!-- Populated by JS -->
    </div>
  </main>
</div>

<!-- Article Preview Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title" id="modal-title"></div>
      <button class="modal__close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal__meta" id="modal-meta"></div>
    <div class="modal__body" id="modal-body"></div>
    <div class="modal__actions" id="modal-actions"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-text">Article approved!</span>
</div>

<script>
  // ── Data Store ──
  // In production, this would read from your content/pending/ and content/published/ directories
  // via a build script or API. For now, it mirrors the actual markdown files.

  let articles = [
    {
      id: 'top-ai-tools-productivity-2026',
      title: 'Top AI Tools for Productivity in 2026',
      description: 'A comprehensive review of the 15 best AI tools that will transform your productivity this year.',
      category: 'Productivity',
      author: 'Sarah Ahmed',
      date: '2026-03-28',
      tags: ['AI tools', 'productivity', '2026', 'workflow'],
      readTime: '8 min',
      emoji: '🤖',
      status: 'pending',
      file: '../content/pending/top-ai-tools-productivity-2026.md',
      excerpt: `This article covers the 15 best AI productivity tools tested extensively in 2026. Topics include: AI assistants (Claude, ChatGPT, Gemini), AI writing tools (Notion AI, Jasper), AI meeting tools (Otter.ai, Fireflies), AI email tools (SaneBox, Superhuman AI), and AI project management tools. Each tool is rated on ease of use, power, and value for money.`
    },
    {
      id: 'chatgpt-vs-claude-2026',
      title: 'ChatGPT vs Claude 2026: Which AI Is Actually Better?',
      description: 'An in-depth head-to-head comparison of ChatGPT and Claude across writing, coding, reasoning, and cost.',
      category: 'Comparison',
      author: 'Marcus Kim',
      date: '2026-03-27',
      tags: ['ChatGPT', 'Claude', 'AI comparison', 'OpenAI', 'Anthropic'],
      readTime: '6 min',
      emoji: '⚔️',
      status: 'pending',
      file: '../content/pending/chatgpt-vs-claude-2026.md',
      excerpt: `This comparison puts ChatGPT-4o and Claude Sonnet head-to-head across 40+ real tasks. Categories tested: creative writing, technical writing, code generation, data analysis, reasoning/logic, conversation quality, and speed. Verdict: Claude wins on nuance and long-form writing; ChatGPT wins on plugins and image generation. Full scoring matrix included.`
    },
    {
      id: 'best-ai-writing-tools-bloggers',
      title: 'Best AI Writing Tools for Bloggers in 2026',
      description: 'The complete AI writing stack for bloggers — from ideation to SEO-optimized final post.',
      category: 'AI Writing',
      author: 'Jamie Rivera',
      date: '2026-03-26',
      tags: ['AI writing', 'blogging', 'content creation', 'SEO', 'Jasper'],
      readTime: '5 min',
      emoji: '✍️',
      status: 'pending',
      file: '../content/pending/best-ai-writing-tools-bloggers.md',
      excerpt: `Covers the best AI writing tools for bloggers in 2026 including Jasper, Copy.ai, Surfer SEO, Frase.io, Writesonic, and more. The article explains how to build a complete AI writing workflow: ideation → outline → first draft → SEO optimization → final edit. Includes pricing comparison and which tool to use at each stage.`
    }
  ];

  let currentTab = 'pending';
  let currentArticleId = null;

  // ── Render ──
  function renderArticles() {
    const container = document.getElementById('articles-container');
    const filtered = articles.filter(a => a.status === currentTab);

    updateStats();

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">${currentTab === 'pending' ? '🎉' : currentTab === 'published' ? '📭' : '🗃️'}</div>
          <div class="empty-state__title">${
            currentTab === 'pending' ? 'Queue is clear!' :
            currentTab === 'published' ? 'Nothing published yet' : 'No rejected articles'
          }</div>
          <div class="empty-state__subtitle">${
            currentTab === 'pending' ? 'All articles have been reviewed. Great work!' :
            currentTab === 'published' ? 'Approve articles from the pending queue to publish them.' :
            'Rejected articles will appear here.'
          }</div>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="articles-list">${filtered.map(a => renderRow(a)).join('')}</div>`;
  }

  function renderRow(a) {
    const categoryColors = {
      'Productivity': '#e6f0ff; color:#0066ff',
      'Comparison': '#f0e6ff; color:#6633cc',
      'AI Writing': '#e6fff0; color:#00aa55',
      'Business': '#fff3e6; color:#cc6600',
      'Design': '#e6fff0; color:#00aa55',
    };
    const catStyle = categoryColors[a.category] || '#e6f0ff; color:#0066ff';

    const pendingActions = `
      <button class="action-btn action-btn--view" onclick="openModal('${a.id}')">👁 Preview</button>
      <button class="action-btn action-btn--approve" onclick="approveArticle('${a.id}')">✓ Approve</button>
      <button class="action-btn action-btn--reject" onclick="rejectArticle('${a.id}')">✗ Reject</button>`;

    const publishedActions = `
      <button class="action-btn action-btn--view" onclick="openModal('${a.id}')">👁 View</button>
      <button class="action-btn action-btn--undo" onclick="undoAction('${a.id}')">↩ Unpublish</button>`;

    const rejectedActions = `
      <button class="action-btn action-btn--view" onclick="openModal('${a.id}')">👁 View</button>
      <button class="action-btn action-btn--approve" onclick="approveArticle('${a.id}')">✓ Re-approve</button>`;

    const actions = a.status === 'pending' ? pendingActions :
                    a.status === 'published' ? publishedActions : rejectedActions;

    return `
      <div class="article-row ${a.status !== 'pending' ? a.status : ''}" id="row-${a.id}">
        <div class="article-row__emoji">${a.emoji}</div>
        <div class="article-row__body">
          <div class="article-row__title">${a.title}</div>
          <div class="article-row__meta">
            <span style="background:${catStyle}; padding:2px 8px; border-radius:100px; font-weight:700; font-size:11px; letter-spacing:0.04em; text-transform:uppercase;">${a.category}</span>
            <span class="dot">·</span>
            <span>${a.author}</span>
            <span class="dot">·</span>
            <span>${formatDate(a.date)}</span>
            <span class="dot">·</span>
            <span>${a.readTime} read</span>
            <span class="status-pill status-pill--${a.status}">${a.status}</span>
          </div>
        </div>
        <div class="article-row__actions">${actions}</div>
      </div>`;
  }

  function updateStats() {
    const pending = articles.filter(a => a.status === 'pending').length;
    const published = articles.filter(a => a.status === 'published').length;
    const rejected = articles.filter(a => a.status === 'rejected').length;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-published').textContent = published;
    document.getElementById('stat-rejected').textContent = rejected;
    document.getElementById('stat-total').textContent = articles.length;
    document.getElementById('pending-badge').textContent = pending;
    document.getElementById('pending-badge').style.display = pending > 0 ? '' : 'none';
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── Tab Switching ──
  function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar__nav-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    const titles = { pending: 'Pending Review', published: 'Published Articles', rejected: 'Rejected Articles' };
    const metas = {
      pending: 'Articles awaiting your approval',
      published: 'Articles live on the site',
      rejected: 'Articles that were declined'
    };
    document.getElementById('page-title').textContent = titles[tab];
    document.getElementById('page-meta').textContent = metas[tab];
    renderArticles();
  }

  // ── Actions ──
  function approveArticle(id) {
    const article = articles.find(a => a.id === id);
    article.status = 'published';
    showToast('✅', `"${article.title.substring(0,40)}..." approved and published!`);
    renderArticles();
    closeModal();
    // In production: move file from content/pending/ to content/published/
    // git mv content/pending/${id}.md content/published/${id}.md && git push
    logAction('APPROVE', id);
  }

  function rejectArticle(id) {
    const article = articles.find(a => a.id === id);
    article.status = 'rejected';
    showToast('❌', `"${article.title.substring(0,40)}..." has been rejected.`);
    renderArticles();
    closeModal();
    logAction('REJECT', id);
  }

  function undoAction(id) {
    const article = articles.find(a => a.id === id);
    article.status = 'pending';
    showToast('↩', `"${article.title.substring(0,40)}..." moved back to pending.`);
    renderArticles();
    logAction('UNDO', id);
  }

  function approveAll() {
    const pending = articles.filter(a => a.status === 'pending');
    if (pending.length === 0) { showToast('ℹ️', 'No pending articles to approve.'); return; }
    pending.forEach(a => { a.status = 'published'; logAction('APPROVE', a.id); });
    showToast('✅', `All ${pending.length} pending articles approved!`);
    renderArticles();
  }

  function refreshDashboard() {
    showToast('↻', 'Dashboard refreshed.');
    renderArticles();
  }

  function logAction(action, id) {
    const log = JSON.parse(localStorage.getItem('talentedatai_log') || '[]');
    log.unshift({ action, id, timestamp: new Date().toISOString() });
    localStorage.setItem('talentedatai_log', JSON.stringify(log.slice(0, 100)));
  }

  // ── Modal ──
  function openModal(id) {
    currentArticleId = id;
    const a = articles.find(a => a.id === id);
    const categoryColors = {
      'Productivity': 'background:#e6f0ff; color:#0066ff',
      'Comparison': 'background:#f0e6ff; color:#6633cc',
      'AI Writing': 'background:#e6fff0; color:#00aa55',
    };
    const catStyle = categoryColors[a.category] || 'background:#e6f0ff; color:#0066ff';

    document.getElementById('modal-title').textContent = `${a.emoji} ${a.title}`;
    document.getElementById('modal-meta').innerHTML = `
      <span class="modal__meta-tag" style="${catStyle}; padding:4px 12px; border-radius:100px; font-size:12px; font-weight:700;">${a.category}</span>
      <span class="modal__meta-tag" style="background:#f4f4f8; color:#6b6b8a; padding:4px 12px; border-radius:100px; font-size:12px;">By ${a.author}</span>
      <span class="modal__meta-tag" style="background:#f4f4f8; color:#6b6b8a; padding:4px 12px; border-radius:100px; font-size:12px;">${formatDate(a.date)}</span>
      <span class="modal__meta-tag" style="background:#f4f4f8; color:#6b6b8a; padding:4px 12px; border-radius:100px; font-size:12px;">${a.readTime} read</span>
    `;
    document.getElementById('modal-body').innerHTML = `
      <strong>Description:</strong><br>${a.description}<br><br>
      <strong>Tags:</strong> ${a.tags.map(t => `<span style="background:#f4f4f8; padding:2px 8px; border-radius:6px; font-size:12px; margin-right:4px;">${t}</span>`).join('')}<br><br>
      <strong>File:</strong> <code style="background:#f4f4f8; padding:2px 6px; border-radius:4px; font-size:12px;">${a.file}</code><br><br>
      <strong>Content Preview:</strong><br><br>${a.excerpt}
    `;

    const actionsEl = document.getElementById('modal-actions');
    if (a.status === 'pending') {
      actionsEl.innerHTML = `
        <button class="btn btn--reject" onclick="rejectArticle('${a.id}')">✗ Reject</button>
        <button class="btn btn--approve" onclick="approveArticle('${a.id}')">✓ Approve &amp; Publish</button>`;
    } else if (a.status === 'published') {
      actionsEl.innerHTML = `
        <button class="btn btn--ghost" onclick="undoAction('${a.id}')">↩ Unpublish</button>
        <button class="btn btn--primary" onclick="window.open('../index.html','_blank')">🌐 View on Site</button>`;
    } else {
      actionsEl.innerHTML = `
        <button class="btn btn--ghost" onclick="closeModal()">Close</button>
        <button class="btn btn--approve" onclick="approveArticle('${a.id}')">✓ Re-approve</button>`;
    }

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Toast ──
  function showToast(icon, text) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = icon;
    document.getElementById('toast-text').textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Init ──
  renderArticles();
</script>
</body>
</html>
