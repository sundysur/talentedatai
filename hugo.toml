baseURL = 'https://www.talentedatai.com/'
languageCode = 'en-us'
title = 'TalentedAtAI'
theme = 'PaperMod'
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = 'production'
  title = 'Talented At AI'
  description = 'Honest reviews and practical guides for AI tools. Cut through the hype and find what actually works.'
  keywords = ['AI tools', 'AI reviews', 'artificial intelligence', 'AI guides']
  author = 'TalentedAtAI'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  mainSections = ['posts']
  timeZone = 'Asia/Kolkata'

  [params.homeInfoParams]
    Title = 'Welcome to TalentedAtAI'
    Content = 'We research, test and review AI tools so you can make smarter decisions about what to use, what to skip, and what is worth paying for. No hype. No sponsored opinions. Just honest takes.'

  [params.assets]
    favicon = '/images/favicon.png'
    favicon16x16 = '/images/favicon.png'
    favicon32x32 = '/images/favicon.png'
    disableHLJS = true

  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:hello@talentedatai.com'

  [params.profileMode]
    enabled = false
    title = 'TalentedAtAI'
    subtitle = 'Honest reviews and practical guides for AI tools. Cut through the hype and find what actually works.'
    imageUrl = '/images/hero.jpg'
    imageWidth = 200
    imageHeight = 200
    imageTitle = 'TalentedAtAI'

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = 'TalentedAtAI'
    icon = '/images/hero.jpg'
    iconHeight = 35

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[markup.highlight]
  noClasses = false

[[menu.main]]
  name = 'Home'
  url = '/'
  weight = 1

[[menu.main]]
  name = 'About'
  url = '/about/'
  weight = 2

[[menu.main]]
  name = 'Contact'
  url = '/contact/'
  weight = 3

[[menu.main]]
  name = 'Privacy Policy'
  url = '/privacy-policy/'
  weight = 4